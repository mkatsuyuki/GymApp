<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Treino &amp; Dieta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0D0D0F;color:#fff;font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,textarea{font-family:inherit}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-appearance:none;color:#fff}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{display:none}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10B981;color:#fff;padding:10px 24px;border-radius:12px;font-weight:700;font-size:13px;z-index:999;animation:fo 2.5s forwards}
@keyframes fo{0%,70%{opacity:1}100%{opacity:0}}
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const LS={get(k){try{const v=localStorage.getItem("pk_"+k);return v?JSON.parse(v):null}catch{return null}},set(k,v){try{localStorage.setItem("pk_"+k,JSON.stringify(v))}catch{}}};
const cs={fontFamily:"-apple-system,'SF Pro Display','Segoe UI',sans-serif",maxWidth:480,margin:"0 auto",background:"#0D0D0F",minHeight:"100vh",color:"#fff"};
const WC=["#3B82F6","#F97316","#10B981","#A855F7"];
const isWk=t=>{const l=(t||"").toLowerCase();return!l.includes("warmup")&&!l.includes("feeder")};
// Rest: uses per-workout rules from sheet, falls back to defaults
function restFor(repStr,rules){
  const n=parseInt(repStr)||10;
  if(rules&&rules.length){
    for(var i=0;i<rules.length;i++){
      var r=rules[i];
      if(n>=r.repsMin&&n<=r.repsMax)return r.rest||90;
    }
  }
  return n>=20?40:n>=12?55:n>=8?105:120;
}
function getInc(exName){
  const l=(exName||"").toLowerCase();
  if(l.includes("halter")||l.includes("lateral"))return 2;
  if(l.includes("alternada"))return 1;
  if(l.includes("barra")||l.includes("stiff")||l.includes("terra"))return 2.5;
  return 5;
}
const fmtDate=d=>d?.split("-").reverse().join("/")||"";
function Toast({msg}){return msg?<div className="toast">{msg}</div>:null}

// Debug log visible in the app
var _dbg=[];
function dbg(msg){_dbg.push(new Date().toLocaleTimeString()+" "+msg);console.log("[GymApp]",msg)}
function getDbg(){return _dbg.join("\n")}

// JSONP fetch (bypasses CORS, works from file://)
function fetchJsonp(url){
  return new Promise(function(resolve,reject){
    var cb="_cb"+Date.now()+Math.random().toString(36).slice(2);
    dbg("JSONP: criando callback "+cb);
    var timer=setTimeout(function(){
      dbg("JSONP: timeout 20s");
      try{document.head.removeChild(s)}catch(e){}
      delete window[cb];reject(new Error("Timeout 20s"))
    },20000);
    window[cb]=function(data){
      dbg("JSONP: callback chamado! keys="+Object.keys(data||{}).join(","));
      clearTimeout(timer);delete window[cb];resolve(data)
    };
    var s=document.createElement("script");
    var fullUrl=url+(url.indexOf("?")>=0?"&":"?")+"callback="+cb;
    dbg("JSONP: carregando "+fullUrl.substring(0,80)+"...");
    s.src=fullUrl;
    s.onerror=function(ev){
      dbg("JSONP: script.onerror disparou. Event: "+JSON.stringify({type:ev?.type}));
      clearTimeout(timer);delete window[cb];
      try{document.head.removeChild(s)}catch(e){}
      reject(new Error("Falha ao carregar script"))
    };
    s.onload=function(){
      dbg("JSONP: script.onload disparou");
      try{document.head.removeChild(s)}catch(e){}
    };
    document.head.appendChild(s);
  });
}

async function fetchSheets(url){
  _dbg=[];
  if(!url||!url.startsWith("http"))throw new Error("URL invalida.");
  dbg("Inicio. Protocolo: "+location.protocol);
  dbg("URL: "+url.substring(0,80)+"...");

  // Attempt 1: regular fetch
  dbg("Tentando fetch()...");
  try{
    var r=await fetch(url,{redirect:"follow"});
    dbg("fetch OK. status="+r.status+" type="+r.type);
    var t=await r.text();
    dbg("Resposta: "+t.substring(0,100)+"...");
    if(t&&t.trim()[0]==="{"){
      var j=JSON.parse(t);
      if(j.error)throw new Error("Script erro: "+j.error);
      dbg("fetch: JSON valido! workouts="+Object.keys(j.workouts||{}).length);
      return j;
    }
    dbg("fetch: resposta nao eh JSON, tentando JSONP...");
  }catch(e){
    dbg("fetch falhou: "+e.message);
  }

  // Attempt 2: JSONP
  dbg("Tentando JSONP...");
  try{
    var data=await fetchJsonp(url);
    if(data&&data.error)throw new Error("Script erro: "+data.error);
    if(data&&data.workouts){
      dbg("JSONP: sucesso! workouts="+Object.keys(data.workouts).length);
      return data;
    }
    throw new Error("Resposta invalida");
  }catch(e2){
    dbg("JSONP falhou: "+e2.message);
  }

  // Attempt 3: XMLHttpRequest (some browsers handle redirects differently)
  dbg("Tentando XMLHttpRequest...");
  try{
    var data3=await new Promise(function(resolve,reject){
      var xhr=new XMLHttpRequest();
      xhr.open("GET",url,true);
      xhr.onload=function(){
        dbg("XHR: status="+xhr.status+" length="+xhr.responseText.length);
        try{resolve(JSON.parse(xhr.responseText))}catch(e){reject(new Error("XHR: JSON parse falhou"))}
      };
      xhr.onerror=function(){dbg("XHR: onerror");reject(new Error("XHR falhou"))};
      xhr.ontimeout=function(){reject(new Error("XHR timeout"))};
      xhr.timeout=15000;
      xhr.send();
    });
    if(data3&&data3.workouts){dbg("XHR: sucesso!");return data3}
  }catch(e3){
    dbg("XHR falhou: "+e3.message);
  }

  throw new Error("Todas as tentativas falharam.\n\nDiagnostico:\n"+getDbg());
}

async function postSheets(url,data){
  try{await fetch(url,{method:"POST",body:JSON.stringify(data),redirect:"follow",mode:"no-cors"})}catch(e){
    try{await fetch(url,{method:"POST",body:JSON.stringify(data),mode:"no-cors"})}catch(e2){}
  }
}

/* ═══════ SHARED COMPONENTS ═══════ */
function Hdr({title,color,onBack,right}){return(<div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"#1A1A1E",borderBottom:"1px solid #2A2A2E",position:"sticky",top:0,zIndex:50}}>
  {onBack&&<button onClick={onBack} style={{background:"none",color:"#888",fontSize:22}}>{"\u2190"}</button>}
  <div style={{flex:1,fontSize:15,fontWeight:800,color:color||"#fff"}}>{title}</div>{right}</div>)}

function RestTimer({seconds,onDone,color}){const[left,setLeft]=useState(seconds);const ref=useRef();
  useEffect(()=>{if(left<=0){onDone?.();return}ref.current=setTimeout(()=>setLeft(l=>l-1),1000);return()=>clearTimeout(ref.current)},[left]);
  const d=left<=0;return(<div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:d?"#10B981":"#1A1A1E",borderTop:"3px solid "+(d?"#10B981":color),padding:"10px 20px",display:"flex",alignItems:"center",gap:12}}>
  <div style={{flex:1}}><div style={{height:6,borderRadius:3,background:"#333",overflow:"hidden"}}><div style={{height:"100%",width:(left/seconds*100)+"%",background:d?"#fff":color,borderRadius:3,transition:"width 1s linear"}}/></div></div>
  <div style={{fontVariantNumeric:"tabular-nums",fontSize:28,fontWeight:900,color:"#fff",minWidth:60,textAlign:"center"}}>{d?"GO!":Math.floor(left/60)+":"+String(left%60).padStart(2,"0")}</div>
  <button onClick={()=>setLeft(0)} style={{background:"#ffffff20",borderRadius:8,padding:"6px 14px",color:"#fff",fontWeight:700,fontSize:13}}>Pular</button></div>)}

function Stepper({value,onChange,step,label,color}){
  const[editing,setEditing]=useState(false);const ref=useRef(null);
  useEffect(()=>{if(editing&&ref.current){ref.current.focus();ref.current.select()}},[editing]);
  const commit=(v)=>{const n=parseFloat(v);if(!isNaN(n)&&n>=0)onChange(n);setEditing(false)};
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
  <div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5}}>{label}</div>
  <div style={{display:"flex",alignItems:"center",gap:6}}>
    <button onClick={()=>onChange(Math.max(0,(value||0)-step))} style={{width:48,height:48,borderRadius:12,background:"#2A2A2E",color:"#fff",fontSize:22,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2212"}</button>
    {editing?
      <input ref={ref} type="number" inputMode="decimal" defaultValue={value||""} onBlur={e=>commit(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")commit(e.target.value)}}
        style={{width:76,height:48,borderRadius:12,background:color+"20",border:"2px solid "+color,textAlign:"center",fontWeight:900,fontSize:22,color:"#fff",outline:"none",fontFamily:"inherit",boxSizing:"border-box",MozAppearance:"textfield",WebkitAppearance:"none"}}/>
    : <div onClick={()=>setEditing(true)} style={{minWidth:76,height:48,borderRadius:12,background:color+"20",border:"2px solid "+color+"60",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:24,color:"#fff",fontVariantNumeric:"tabular-nums",cursor:"pointer"}}>{value||"\u2014"}</div>
    }
    <button onClick={()=>onChange((value||0)+step)} style={{width:48,height:48,borderRadius:12,background:color,color:"#fff",fontSize:22,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button></div></div>)}

function Loader({color,text}){return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:60,gap:16}}>
  <div style={{width:40,height:40,border:"4px solid #2A2A2E",borderTop:"4px solid "+(color||"#3B82F6"),borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
  <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  <div style={{fontSize:13,color:"#888"}}>{text||"Carregando..."}</div></div>)}

/* ═══════ ONBOARDING / SETUP ═══════ */
function SetupTab({url,setUrl,onSync,syncing,syncResult,connected,history,isOnboarding}){
  const[input,setInput]=useState(url||"");const[toast,setToast]=useState("");
  const exportTxt=()=>{let t="";(history||[]).forEach(h=>{t+=`TREINO ${h.workout} - ${fmtDate(h.date)}\n`;h.exercises?.forEach(e=>{const f=e.sets?.filter(s=>s.w&&s.r)||[];if(!f.length)return;t+=`${e.name}: `;t+=f.map(s=>`${s.w}kg x${s.r}`).join(" | ");t+=e.volume?` (vol: ${e.volume})`:"";t+="\n"});t+="\n"});return t.trim()};
  const exportCSV=()=>{let c="Data,Treino,Exercicio,Serie,Peso,Reps,Volume\n";(history||[]).forEach(h=>{h.exercises?.forEach(e=>{e.sets?.filter(s=>s.w&&s.r).forEach(s=>{c+=`${h.date},${h.workout},${e.name},${s.type},${s.w},${s.r},${isWk(s.type)?s.w*s.r:""}\n`})})});return c};
  const copy=async t=>{try{await navigator.clipboard.writeText(t)}catch{const a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();document.execCommand("copy");document.body.removeChild(a)}setToast("Copiado!");setTimeout(()=>setToast(""),2500)};
  const share=txt=>{const u="https://wa.me/?text="+encodeURIComponent(txt);window.open(u,"_blank")};

  return(<div style={{padding:16,paddingBottom:20}}>
    <Toast msg={toast}/>
    {isOnboarding&&<div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:44,marginBottom:8}}>{"\u{1F3CB}\uFE0F"}</div>
      <div style={{fontSize:20,fontWeight:900,color:"#fff"}}>Treino &amp; Dieta</div>
      <div style={{fontSize:13,color:"#888",marginTop:4}}>Conecte sua planilha Google Sheets para comecar</div>
    </div>}
    {!isOnboarding&&<div style={{fontSize:18,fontWeight:900,marginBottom:14}}>Configuracao</div>}

    {!isOnboarding&&<div style={{background:connected?"#10B98120":"#EF444420",borderRadius:14,padding:14,marginBottom:14,border:connected?"2px solid #10B98150":"2px solid #EF444450"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:12,height:12,borderRadius:"50%",background:connected?"#10B981":"#EF4444"}}/>
        <span style={{fontWeight:700,fontSize:13,color:connected?"#10B981":"#EF4444"}}>{connected?"Conectado":"Nao conectado"}</span>
      </div>
    </div>}

    <div style={{background:"#1A1A1E",borderRadius:14,padding:14,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>URL do Google Apps Script</div>
      <div style={{fontSize:10,color:"#888",marginBottom:10,lineHeight:1.4}}>Cole a URL completa do Web App (Implantar {"\u2192"} URL do App)</div>
      <input value={input} onChange={e=>setInput(e.target.value)} placeholder="https://script.google.com/macros/s/..."
        style={{width:"100%",padding:12,borderRadius:10,border:"2px solid #333",background:"#0D0D0F",color:"#fff",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
      <button onClick={()=>{setUrl(input.trim());LS.set("url",input.trim());onSync(input.trim())}} disabled={syncing||!input?.trim()?.length}
        style={{width:"100%",marginTop:10,padding:14,borderRadius:12,background:syncing?"#333":"#3B82F6",color:"#fff",fontWeight:800,fontSize:14,opacity:input?.trim()?.length?1:.4}}>
        {syncing?"Sincronizando...":isOnboarding?"Conectar":"Conectar e Sincronizar"}</button>
      {syncResult&&<div style={{marginTop:8,fontSize:12,fontWeight:600,color:syncResult.ok?"#10B981":"#EF4444",lineHeight:1.5,whiteSpace:"pre-wrap",background:syncResult.ok?"#10B98110":"#EF444410",padding:10,borderRadius:8}}>{syncResult.msg}</div>}
    </div>

    {!isOnboarding&&connected&&<div style={{background:"#1A1A1E",borderRadius:14,padding:14,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>Atualizar dados da planilha</div>
      <div style={{fontSize:10,color:"#888",marginBottom:10}}>Busca treinos e dieta atualizados do Google Sheets</div>
      <button onClick={()=>onSync(url)} disabled={syncing}
        style={{width:"100%",padding:12,borderRadius:10,background:syncing?"#333":"#F97316",color:"#fff",fontWeight:800,fontSize:13}}>
        {syncing?"Atualizando...":"\u{1F504} Atualizar treinos e dieta"}</button>
    </div>}

    {!isOnboarding&&(history||[]).length>0&&<div style={{background:"#1A1A1E",borderRadius:14,padding:14,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>Exportar Historico ({history.length} sessoes)</div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <button onClick={()=>copy(exportTxt())} style={{flex:1,padding:"10px 8px",borderRadius:10,background:"#3B82F620",border:"2px solid #3B82F640",color:"#3B82F6",fontWeight:800,fontSize:11}}>{"\u{1F4CB}"} Copiar Texto</button>
        <button onClick={()=>copy(exportCSV())} style={{flex:1,padding:"10px 8px",borderRadius:10,background:"#10B98120",border:"2px solid #10B98140",color:"#10B981",fontWeight:800,fontSize:11}}>{"\u{1F4CA}"} Copiar CSV</button>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>share(exportTxt())} style={{flex:1,padding:"10px 8px",borderRadius:10,background:"#25D36620",border:"2px solid #25D36640",color:"#25D366",fontWeight:800,fontSize:11}}>{"\u{1F4F2}"} WhatsApp</button>
        <button onClick={()=>{const b=new Blob([exportCSV()],{type:"text/csv"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="treinos.csv";a.click();URL.revokeObjectURL(u)}}
          style={{flex:1,padding:"10px 8px",borderRadius:10,background:"#A855F720",border:"2px solid #A855F740",color:"#A855F7",fontWeight:800,fontSize:11}}>{"\u2B07\uFE0F"} Baixar CSV</button>
      </div>
    </div>}

    {!isOnboarding&&<button onClick={()=>{if(confirm("Limpar tudo e resetar?")){localStorage.clear();location.reload()}}}
      style={{width:"100%",padding:10,borderRadius:10,border:"1px solid #EF4444",background:"transparent",color:"#EF4444",fontWeight:700,fontSize:12}}>Limpar tudo e resetar</button>}
  </div>);
}

/* ═══════ DIET TAB ═══════ */
function DietTab({diet}){
  const[mi,setMi]=useState(0);const[sel,setSel]=useState({A:null,B:null,C:null});
  const[sf,setSf]=useState(false);const[st,setSt]=useState(false);
  if(!diet)return(<div style={{padding:40,textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>{"\u{1F37D}\uFE0F"}</div><div style={{fontSize:14,color:"#888"}}>Dieta nao carregada.<br/>Va no Setup e sincronize.</div></div>);
  const mc=diet.macros||{};const m=diet.meals?.[mi];if(!m)return null;const c=WC[mi%4];
  const ic={1:"\u2615",2:"\u{1F37D}\uFE0F",3:"\u{1F96A}",4:"\u{1F319}"};const ali=diet.ali||diet.alimentos||{};
  const fix=(diet.fixedItems||[]).filter(x=>x.ref===m.num);
  return(<div style={{paddingBottom:20}}>
    <div style={{background:"linear-gradient(135deg,#1B3A5C,#2D5F8A)",padding:"14px 16px 12px",borderRadius:"0 0 20px 20px",marginBottom:12}}>
      <div style={{fontSize:10,fontWeight:700,color:"#ffffff80",textTransform:"uppercase",letterSpacing:1}}>Plano Alimentar</div>
      <div style={{fontSize:18,fontWeight:900,color:"#fff",marginBottom:8}}>{mc.kcal_dia||mc.kcal||"--"} kcal/dia</div>
      <div style={{display:"flex",gap:5}}>
        {[["P",(mc.proteina||mc.p)+"g","#EF4444"],["G",(mc.gordura||mc.g)+"g","#F97316"],["C",(mc.carboidrato||mc.c)+"g","#3B82F6"],["H2O",mc.agua,"#10B981"],["Livres",(mc.livres_sem||mc.livres)+"/sem","#A855F7"]].map(([l,v,cl],i)=>
          <div key={i} style={{flex:1,minWidth:55,background:"#ffffff15",borderRadius:8,padding:"4px 2px",textAlign:"center"}}><div style={{fontSize:11,fontWeight:900,color:cl}}>{v}</div><div style={{fontSize:7,color:"#ffffff80",fontWeight:600}}>{l}</div></div>)}
      </div>
    </div>
    <div style={{display:"flex",gap:5,padding:"0 12px",marginBottom:10}}>
      {diet.meals.map((ml,i)=>{const a=mi===i;const cc=WC[i%4];return(
        <button key={i} onClick={()=>{setMi(i);setSel({A:null,B:null,C:null})}} style={{flex:1,padding:"8px 3px",borderRadius:10,background:a?cc+"20":"#1A1A1E",border:a?"2px solid "+cc:"2px solid #2A2A2E",textAlign:"center"}}>
          <div style={{fontSize:18}}>{ic[ml.num]||"\u{1F374}"}</div><div style={{fontSize:8,fontWeight:800,color:a?cc:"#888",marginTop:1}}>Ref.{ml.num}</div><div style={{fontSize:9,fontWeight:700,color:a?"#fff":"#666"}}>{ml.kcal}kcal</div>
        </button>);})}
    </div>
    <div style={{margin:"0 12px",background:"#1A1A1E",borderRadius:14,overflow:"hidden",border:"2px solid "+c+"30"}}>
      <div style={{background:c,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:9,fontWeight:600,opacity:.8,color:"#fff"}}>Refeicao {m.num}</div><div style={{fontSize:16,fontWeight:900,color:"#fff"}}>{ic[m.num]||""} {m.name}</div></div>
        <div style={{display:"flex",gap:3}}>{[["P",m.p],["G",m.g],["C",m.c]].map(([l,v],i)=><span key={i} style={{fontSize:9,fontWeight:800,background:"#fff3",padding:"2px 7px",borderRadius:8,color:"#fff"}}>{l}:{v}g</span>)}</div>
      </div>
      <div style={{padding:10}}>
        {(m.type!=="montavel")?(
          <div style={{display:"flex",flexDirection:"column",gap:5}}>{(m.items||fix).map((it,i)=>
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:8,background:i%2===0?c+"10":"transparent"}}>
              <span style={{fontSize:12,fontWeight:600,color:"#ddd"}}>{it.n||it.item}</span><span style={{fontWeight:800,fontSize:11,color:c,background:c+"15",padding:"2px 8px",borderRadius:8}}>{it.q||it.qty}</span></div>)}</div>
        ):(
          <>
          <div style={{background:"#0D0D0F",borderRadius:8,padding:"7px 10px",marginBottom:8,fontSize:11,color:"#ccc"}}><span style={{fontWeight:800,color:c}}>Monte seu prato:</span> Escolha 1 de cada grupo</div>
          {Object.entries(ali).map(([gk,g])=>{const gc=gk==="A"?"#F97316":gk==="B"?"#3B82F6":"#EF4444";return(
            <div key={gk} style={{marginBottom:8,borderRadius:10,border:"1.5px solid "+gc+"30",overflow:"hidden"}}>
              <div style={{background:gc,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:16}}>{g.emoji||""}</span><div><div style={{fontWeight:800,fontSize:11,color:"#fff"}}>{gk}: {g.title}</div><div style={{fontSize:8,color:"#ffffffaa"}}>Mult: {g.mult}</div></div></div>
                <span style={{background:"#fff3",borderRadius:10,padding:"2px 8px",fontWeight:800,fontSize:11,color:"#fff"}}>{g.mult}</span></div>
              <div style={{padding:3}}>{(g.items||[]).map((it,i)=>{const on=sel[gk]===i;return(
                <button key={i} onClick={()=>setSel(s=>({...s,[gk]:s[gk]===i?null:i}))} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 8px",borderRadius:6,background:on?gc+"18":i%2===0?"#0D0D0F":"transparent",outline:on?"2px solid "+gc+"80":"none",textAlign:"left"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(on?gc:"#444"),background:on?gc:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:800,flexShrink:0}}>{on&&"\u2713"}</div>
                    <div><div style={{fontWeight:600,fontSize:11,color:"#ddd"}}>{it.n||it.name}</div>{(it.nt||it.note)&&<div style={{fontSize:8,color:"#888"}}>{it.nt||it.note}</div>}</div>
                  </div><span style={{fontWeight:800,fontSize:11,color:gc,flexShrink:0}}>{it.q||it.qty}</span></button>);})}</div>
            </div>);})}
          {(sel.A!==null||sel.B!==null||sel.C!==null)&&(
            <div style={{background:c+"10",border:"2px dashed "+c+"40",borderRadius:10,padding:10,marginTop:4}}>
              <div style={{fontWeight:800,fontSize:11,color:c,marginBottom:6}}>{"\u{1F37D}\uFE0F"} Seu Prato</div>
              {["A","B","C"].map(gk=>{if(sel[gk]===null||!ali[gk])return null;const it=ali[gk].items[sel[gk]];if(!it)return null;const gc=gk==="A"?"#F97316":gk==="B"?"#3B82F6":"#EF4444";
                return(<div key={gk} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,marginBottom:3}}>
                  <span style={{background:gc,color:"#fff",borderRadius:4,padding:"1px 5px",fontWeight:700,fontSize:9}}>{gk}</span>
                  <span style={{fontWeight:600,color:"#ccc"}}>{it.n||it.name}</span><span style={{marginLeft:"auto",fontWeight:800,color:gc}}>{it.q||it.qty}</span></div>);})}
              <div style={{borderTop:"1px solid #333",paddingTop:5,marginTop:5,fontSize:10,color:"#888"}}>+ 150g+ salada + 5g azeite<br/>+ Suco limao/maracuja c/ adocante</div>
            </div>)}</>)}
      </div>
    </div>
    <div style={{padding:"0 12px",marginTop:8}}>
      {(diet.frutas||[]).length>0&&<><button onClick={()=>setSf(!sf)} style={{width:"100%",padding:"10px 12px",background:"#1A1A1E",border:"1.5px solid #A855F730",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{fontSize:12,fontWeight:700,color:"#ddd"}}>{"\u{1F34E}"} Porcoes de Frutas</span><span style={{color:"#A855F7",fontWeight:800,transform:sf?"rotate(180deg)":"",transition:"transform .2s"}}>{"\u25BE"}</span></button>
        {sf&&<div style={{background:"#1A1A1E",borderRadius:8,padding:4,marginBottom:8,border:"1px solid #333"}}>{diet.frutas.map((f,i)=>
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 8px",borderRadius:6,background:i%2===0?"#0D0D0F":"transparent"}}><span style={{fontSize:11,color:"#ccc"}}>{f.n||f.name}</span><span style={{fontWeight:800,color:"#A855F7",fontSize:11,flexShrink:0,marginLeft:8}}>{f.q||f.qty}</span></div>)}</div>}</>}
      {(diet.tips||[]).length>0&&<><button onClick={()=>setSt(!st)} style={{width:"100%",padding:"10px 12px",background:"#1A1A1E",border:"1.5px solid #3B82F630",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{fontSize:12,fontWeight:700,color:"#ddd"}}>{"\u{1F4A1}"} Dicas</span><span style={{color:"#3B82F6",fontWeight:800,transform:st?"rotate(180deg)":"",transition:"transform .2s"}}>{"\u25BE"}</span></button>
        {st&&<div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:8}}>{diet.tips.map((t,i)=>
          <div key={i} style={{padding:"7px 10px",borderRadius:8,background:"#1A1A1E",fontSize:11,color:"#ccc",lineHeight:1.4,borderLeft:"3px solid #3B82F6"}}>{typeof t==="string"?t:t.text||""}</div>)}</div>}</>}
    </div>
  </div>);
}

/* ═══════ GYM TAB ═══════ */
function GymTab({workouts,syncUrl}){
  const[scr,setScr]=useState("home");const[wk,setWk]=useState(null);const[exIdx,setExIdx]=useState(0);
  const[mobDone,setMobDone]=useState([]);const[sess,setSess]=useState({});const[timer,setTimer]=useState(null);const[fired,setFired]=useState({});
  const[history,setHistory]=useState(LS.get("history")||[]);const[syncing,setSyncing]=useState(false);const[syncMsg,setSyncMsg]=useState("");const[toast,setToast]=useState("");
  const[selWk,setSelWk]=useState(null);const[selEx,setSelEx]=useState(null);

  if(!workouts||!Object.keys(workouts).length)return(<div style={{padding:40,textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>{"\u{1F3CB}\uFE0F"}</div><div style={{fontSize:14,color:"#888"}}>Nenhum treino carregado.<br/>Va no Setup e conecte sua planilha.</div></div>);

  const wkIds=Object.keys(workouts);const wo=wk?workouts[wk]:null;
  const exs=wo?.exercises||wo?.exs||[];const ex=exs[exIdx];const tot=exs.length;
  const mob=wo?.mobility||wo?.mob||[];
  const getN=e=>e?.name||e?.n||"";const getSets=e=>e?.sets||[];const getSetType=s=>s?.type||s?.t||"";
  const getSetReps=s=>s?.targetReps||s?.r||"";const getSetObs=s=>s?.obs||s?.o||"";
  const getTitle=w=>((w?.title||"").replace(/^TREINO\s*/i,""))||"Treino";

  const gD=(ei,si)=>sess[ei+"-"+si]||{};const sD=(ei,si,d)=>setSess(s=>({...s,[ei+"-"+si]:{...(s[ei+"-"+si]||{}),...d}}));
  const eV=ei=>{let v=0;getSets(exs[ei]).forEach((s,si)=>{if(isWk(getSetType(s))){const d=gD(ei,si);if(d.w&&d.r)v+=d.w*d.r}});return v};
  const start=id=>{setWk(id);setExIdx(0);setMobDone([]);setSess({});setTimer(null);setFired({});setScr("mob")};
  const finish=()=>{const dt=new Date().toISOString().split("T")[0];const d={workout:wk,date:dt,timestamp:Date.now(),exercises:exs.map((e,ei)=>({name:getN(e),sets:getSets(e).map((s,si)=>({type:getSetType(s),...gD(ei,si)})),volume:eV(ei)}))};const nh=[d,...history].slice(0,50);setHistory(nh);LS.set("history",nh);setScr("done")};

  const cancelSet=(ei,si)=>{
    const fk=ei+"-"+si;
    setSess(s=>{const n={...s};delete n[fk];return n});
    setFired(f=>{const n={...f};delete n[fk];return n});
    setTimer(null);
  };

  const sync=async()=>{if(!syncUrl){setSyncMsg("Configure URL no Setup");return}setSyncing(true);setSyncMsg("");
    const d={workout:wk,date:new Date().toISOString().split("T")[0],exercises:exs.map((e,ei)=>({name:getN(e),row:getSets(e)[0]?.row,sets:getSets(e).map((s,si)=>({...gD(ei,si),row:s.row,type:getSetType(s)})).filter(s=>s.w&&s.r)}))};
    try{await postSheets(syncUrl,d);setSyncMsg("Enviado!")}catch(e){setSyncMsg("Erro: "+e.message)}setSyncing(false)};

  const lastS=useCallback(nm=>{for(const h of history)if(h.workout===wk){const e=h.exercises?.find(x=>x.name===nm);if(e)return e}return null},[history,wk]);
  const wColor=WC[wkIds.indexOf(wk)%4]||"#3B82F6";

  const buildSessionText=()=>{
    let t=`*TREINO ${wk} - ${getTitle(wo)}*\n${fmtDate(new Date().toISOString().split("T")[0])}\n\n`;
    let tv=0;
    exs.forEach((e,ei)=>{
      const sets=getSets(e).map((s,si)=>({...s,...gD(ei,si)})).filter(s=>s.w&&s.r);
      if(!sets.length)return;
      t+=`*${getN(e)}*\n`;
      sets.forEach(s=>{t+=`  ${getSetType(s)}: ${s.w}kg x ${s.r}`;if(isWk(getSetType(s)))t+=` (${s.w*s.r})`;t+="\n"});
      const v=eV(ei);if(v){t+=`  Vol: ${v}\n`;tv+=v}
      t+="\n";
    });
    t+=`*VOLUME TOTAL: ${tv.toLocaleString()}*`;
    return t;
  };

  // HOME
  if(scr==="home")return(<div style={{paddingBottom:20}}>
    <div style={{padding:"14px 16px 8px"}}><div style={{fontSize:18,fontWeight:900,color:"#fff"}}>Treinos</div></div>
    <div style={{padding:"0 12px",display:"flex",flexDirection:"column",gap:8}}>
      {wkIds.map((id,idx)=>{const w=workouts[id];const c=WC[idx%4];return(
        <button key={id} onClick={()=>start(id)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"#1A1A1E",borderRadius:14,border:"2px solid "+c+"30",textAlign:"left"}}>
          <div style={{width:48,height:48,borderRadius:12,background:c+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:c,border:"2px solid "+c+"40"}}>{id}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,fontWeight:700,color:c,textTransform:"uppercase",letterSpacing:.5}}>Treino {id}</div>
            <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{getTitle(w)}</div>
            <div style={{fontSize:10,color:"#aaa",marginTop:1}}>{(w.exercises||w.exs||[]).length} exerc. - {(w.exercises||w.exs||[]).reduce((a,e)=>a+(e.sets?.length||0),0)} series</div>
          </div>
          <div style={{color:c,fontSize:20,fontWeight:800}}>{"\u2192"}</div>
        </button>);})}
    </div>

    {/* Progress button */}
    <div style={{padding:"12px 12px 0"}}>
      <button onClick={()=>{setSelWk(null);setSelEx(null);setScr("progress")}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"#1A1A1E",borderRadius:14,border:"2px solid #F5982030",textAlign:"left"}}>
        <div style={{width:48,height:48,borderRadius:12,background:"#F5982020",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:"2px solid #F5982040"}}>{"\u{1F4C8}"}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:"#F59820",textTransform:"uppercase",letterSpacing:.5}}>Evolucao</div>
          <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>Ver Progresso</div>
          <div style={{fontSize:10,color:"#aaa",marginTop:1}}>Graficos de carga e volume</div>
        </div>
        <div style={{color:"#F59820",fontSize:20,fontWeight:800}}>{"\u2192"}</div>
      </button>
    </div>

    {history.length>0&&<div style={{padding:"14px 12px 0"}}><div style={{fontSize:11,fontWeight:700,color:"#666",textTransform:"uppercase",marginBottom:6}}>Ultimas sessoes</div>
      {history.slice(0,4).map((h,i)=>{const c=WC[wkIds.indexOf(h.workout)%4]||"#666";return(
        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"#1A1A1E",borderRadius:8,marginBottom:4,borderLeft:"3px solid "+c}}>
          <div><span style={{fontWeight:800,color:c,fontSize:12}}>Treino {h.workout}</span><span style={{color:"#888",fontSize:11,marginLeft:8}}>{fmtDate(h.date)}</span></div>
          <div style={{fontSize:10,color:"#888"}}>{h.exercises?.reduce((a,e)=>a+(e.volume||0),0).toLocaleString()} vol</div></div>)})}</div>}
  </div>);

  // PROGRESS
  if(scr==="progress"){
    const pWkId=selWk||wkIds[0];
    const pw=workouts[pWkId];const pExs=pw?.exercises||pw?.exs||[];
    const pc=WC[wkIds.indexOf(pWkId)%4]||"#3B82F6";

    // Build data for a given exercise: combine sheet history + local history
    const buildData=(exName)=>{
      const points=[];
      // From sheet: each work set has a history[] array; index = session number
      const sheetEx=pExs.find(e=>(e.name||e.n)===exName);
      if(sheetEx){
        const sets=sheetEx.sets||[];
        const workSets=sets.filter(s=>isWk(s.type||s.t||""));
        if(workSets.length>0&&workSets[0].history?.length>0){
          const numSessions=workSets[0].history.length;
          for(let si=0;si<numSessions;si++){
            let maxW=0,vol=0;
            workSets.forEach(s=>{
              const h=s.history?.[si];
              if(h&&h.w){maxW=Math.max(maxW,h.w);vol+=h.w*(h.r||0)}
            });
            if(maxW>0)points.push({label:"S"+(si+1),maxW,vol,src:"sheet"});
          }
        }
      }
      // From local history (most recent first, reverse to chronological)
      const localSessions=[...history].filter(h=>h.workout===pWkId).reverse();
      localSessions.forEach((h,i)=>{
        const ex=h.exercises?.find(e=>e.name===exName);
        if(!ex)return;
        let maxW=0,vol=0;
        (ex.sets||[]).forEach(s=>{
          if(s.w&&s.r&&isWk(s.type||"")){maxW=Math.max(maxW,s.w);vol+=s.w*s.r}
        });
        if(maxW>0)points.push({label:fmtDate(h.date).substring(0,5),maxW,vol,src:"local"});
      });
      return points;
    };

    // Mini SVG line chart
    const Chart=({data,dataKey,color,label,unit})=>{
      if(!data||data.length<2)return(<div style={{padding:20,textAlign:"center",fontSize:11,color:"#666"}}>Precisa de pelo menos 2 sessoes para gerar grafico</div>);
      const vals=data.map(d=>d[dataKey]);
      const min=Math.min(...vals);const max=Math.max(...vals);
      const range=max-min||1;
      const W=320;const H=140;const padL=40;const padR=10;const padT=10;const padB=28;
      const cW=W-padL-padR;const cH=H-padT-padB;
      const pts=data.map((d,i)=>({
        x:padL+(i/(data.length-1))*cW,
        y:padT+cH-(((d[dataKey]-min)/range)*cH),
        v:d[dataKey],label:d.label
      }));
      const line=pts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
      const area=line+" L"+pts[pts.length-1].x.toFixed(1)+","+(padT+cH)+" L"+pts[0].x.toFixed(1)+","+(padT+cH)+" Z";
      // Y axis labels
      const ySteps=4;const yLabels=[];for(let i=0;i<=ySteps;i++){yLabels.push(min+(range/ySteps)*i)}

      return(<div style={{marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,color:"#aaa",marginBottom:4}}>{label}</div>
        <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto"}}>
          {/* Grid lines */}
          {yLabels.map((v,i)=>{const y=padT+cH-((v-min)/range)*cH;return(
            <g key={i}><line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#2A2A2E" strokeWidth="1"/>
              <text x={padL-4} y={y+3} textAnchor="end" fill="#666" fontSize="9">{Math.round(v)}{unit}</text></g>
          )})}
          {/* Area fill */}
          <path d={area} fill={color+"15"} stroke="none"/>
          {/* Line */}
          <path d={line} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          {/* Dots + labels */}
          {pts.map((p,i)=><g key={i}>
            <circle cx={p.x} cy={p.y} r="4" fill={color} stroke="#0D0D0F" strokeWidth="2"/>
            {(i===0||i===pts.length-1||data.length<=6)&&<text x={p.x} y={H-4} textAnchor="middle" fill="#888" fontSize="8">{p.label}</text>}
            {(i===pts.length-1)&&<text x={p.x} y={p.y-10} textAnchor="middle" fill={color} fontSize="10" fontWeight="bold">{p.v}{unit}</text>}
          </g>)}
          {/* First value label */}
          {pts.length>1&&<text x={pts[0].x} y={pts[0].y-10} textAnchor="middle" fill="#888" fontSize="9">{pts[0].v}{unit}</text>}
        </svg>
        {/* Change indicator */}
        {pts.length>=2&&(()=>{const first=vals[0];const last=vals[vals.length-1];const diff=last-first;const pct=first?((diff/first)*100).toFixed(1):0;
          return(<div style={{display:"flex",justifyContent:"center",gap:12,marginTop:2}}>
            <span style={{fontSize:10,color:diff>0?"#10B981":diff<0?"#EF4444":"#888",fontWeight:700}}>{diff>0?"\u2191":diff<0?"\u2193":"\u2192"} {diff>0?"+":""}{diff}{unit} ({diff>0?"+":""}{pct}%)</span>
          </div>)
        })()}
      </div>);
    };

    return(<div style={{paddingBottom:20}}>
      <Hdr title="Progresso" color="#F59820" onBack={()=>{setScr("home");setSelEx(null)}}/>
      <div style={{padding:"10px 12px"}}>
        {/* Workout tabs */}
        <div style={{display:"flex",gap:5,marginBottom:14}}>
          {wkIds.map((id,idx)=>{const a=pWkId===id;const c2=WC[idx%4];return(
            <button key={id} onClick={()=>{setSelWk(id);setSelEx(null)}} style={{flex:1,padding:"10px 4px",borderRadius:10,background:a?c2+"20":"#1A1A1E",border:a?"2px solid "+c2:"2px solid #2A2A2E",textAlign:"center"}}>
              <div style={{fontSize:16,fontWeight:900,color:a?c2:"#888"}}>{id}</div>
              <div style={{fontSize:9,fontWeight:700,color:a?"#fff":"#666"}}>{getTitle(workouts[id])}</div>
            </button>);})}
        </div>

        {selEx===null?(
          /* Exercise list */
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {pExs.map((ex,i)=>{
              const name=ex.name||ex.n;
              const data=buildData(name);
              const hasData=data.length>=2;
              const lastW=data.length?data[data.length-1].maxW:null;
              const firstW=data.length>=2?data[0].maxW:null;
              const diff=firstW&&lastW?lastW-firstW:0;
              return(
                <button key={i} onClick={()=>setSelEx(i)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:"#1A1A1E",borderRadius:12,border:"2px solid "+pc+"20",textAlign:"left"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{name}</div>
                    <div style={{fontSize:10,color:"#888",marginTop:2}}>{data.length} sessoes registradas</div>
                  </div>
                  {hasData&&<div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:900,color:pc}}>{lastW}kg</div>
                    <div style={{fontSize:10,fontWeight:700,color:diff>0?"#10B981":diff<0?"#EF4444":"#888"}}>{diff>0?"\u2191+":diff<0?"\u2193":""}{diff}kg</div>
                  </div>}
                  {!hasData&&<div style={{fontSize:10,color:"#555"}}>—</div>}
                </button>);
            })}
          </div>
        ):(
          /* Exercise detail with charts */
          (()=>{
            const ex=pExs[selEx];const name=ex?.name||ex?.n||"";
            const data=buildData(name);
            return(<div>
              <button onClick={()=>setSelEx(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",color:"#888",fontSize:12,marginBottom:10,padding:0}}>
                {"\u2190"} <span style={{color:"#aaa"}}>Todos exercicios</span></button>
              <div style={{fontSize:17,fontWeight:900,color:"#fff",marginBottom:4}}>{name}</div>
              <div style={{fontSize:11,color:"#888",marginBottom:14}}>{data.length} sessoes</div>

              <div style={{background:"#1A1A1E",borderRadius:14,padding:14,marginBottom:10}}>
                <Chart data={data} dataKey="maxW" color={pc} label="Carga Maxima (serie de trabalho)" unit="kg"/>
              </div>
              <div style={{background:"#1A1A1E",borderRadius:14,padding:14,marginBottom:10}}>
                <Chart data={data} dataKey="vol" color="#10B981" label="Volume Total (carga x reps)" unit=""/>
              </div>

              {data.length>0&&<div style={{background:"#1A1A1E",borderRadius:14,padding:14}}>
                <div style={{fontSize:11,fontWeight:700,color:"#aaa",marginBottom:8}}>Historico de sessoes</div>
                {data.map((d,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<data.length-1?"1px solid #2A2A2E":"none"}}>
                    <span style={{fontSize:11,color:"#888"}}>{d.label}</span>
                    <div style={{display:"flex",gap:12}}>
                      <span style={{fontSize:11,fontWeight:700,color:pc}}>{d.maxW}kg</span>
                      <span style={{fontSize:11,fontWeight:700,color:"#10B981"}}>vol {d.vol}</span>
                    </div>
                  </div>
                ))}
              </div>}
            </div>);
          })()
        )}
      </div>
    </div>);
  }

  // MOBILITY
  if(scr==="mob")return(<div>
    <Hdr title={"Treino "+wk+" - Mobilidade"} color={wColor} onBack={()=>setScr("home")}/>
    <div style={{padding:14}}>
      {mob.length>0&&<><div style={{background:wColor+"15",borderRadius:12,padding:"10px 14px",marginBottom:12,border:"1.5px solid "+wColor+"30"}}><div style={{fontSize:12,fontWeight:700,color:wColor}}>Mobilidade e Alongamento</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>{mob.map((m,i)=>{const dn=mobDone.includes(i);return(
          <button key={i} onClick={()=>setMobDone(d=>dn?d.filter(x=>x!==i):[...d,i])} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:dn?wColor+"18":"#1A1A1E",borderRadius:10,border:dn?"2px solid "+wColor+"50":"2px solid #2A2A2E"}}>
            <div style={{width:24,height:24,borderRadius:7,flexShrink:0,background:dn?wColor:"#2A2A2E",border:dn?"none":"2px solid #444",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:800}}>{dn&&"\u2713"}</div>
            <span style={{fontSize:12,color:dn?"#fff":"#aaa",fontWeight:dn?600:400,textDecoration:dn?"line-through":"none"}}>{m}</span></button>)})}</div></>}
      <button onClick={()=>setScr("train")} style={{width:"100%",marginTop:16,padding:14,borderRadius:12,background:wColor,color:"#fff",fontWeight:800,fontSize:15}}>Iniciar Treino {"\u2192"}</button>
    </div></div>);

  // TRAINING
  if(scr==="train"&&ex){const inc=ex.inc||getInc(getN(ex));const sets=getSets(ex);return(<div style={{paddingBottom:timer?70:0}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#1A1A1E",borderBottom:"1px solid #2A2A2E",position:"sticky",top:0,zIndex:50}}>
      <button onClick={()=>{if(exIdx>0)setExIdx(exIdx-1);else setScr("mob")}} style={{background:"none",color:"#888",fontSize:22,padding:4}}>{"\u2190"}</button>
      <div style={{textAlign:"center",flex:1}}><div style={{fontSize:10,fontWeight:700,color:wColor}}>{exIdx+1}/{tot}</div><div style={{fontSize:13,fontWeight:800,color:"#fff"}}>{getN(ex)}</div></div>
      <button onClick={()=>{if(exIdx<tot-1)setExIdx(exIdx+1);else finish()}} style={{background:"none",color:wColor,fontSize:22,padding:4,fontWeight:800}}>{"\u2192"}</button></div>
    <div style={{display:"flex",gap:3,padding:"6px 14px",justifyContent:"center"}}>{exs.map((_,i)=><div key={i} style={{height:3,flex:1,maxWidth:28,borderRadius:2,background:i===exIdx?wColor:"#2A2A2E"}}/>)}</div>

    {/* Sheet history */}
    {sets.some(s=>s.history?.length>0)&&<div style={{margin:"0 14px 6px",padding:"6px 10px",background:"#1A1A1E",borderRadius:8,borderLeft:"3px solid #555"}}>
      <div style={{fontSize:9,fontWeight:700,color:"#666",marginBottom:3}}>HISTORICO (planilha)</div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{sets.map((s,i)=>{const l=s.history?.[s.history.length-1];if(!l)return null;return <span key={i} style={{fontSize:10,color:"#aaa",background:"#2A2A2E",padding:"2px 6px",borderRadius:5}}>{l.w}x{l.r}</span>})}</div></div>}

    {/* Local history */}
    {(()=>{const l=lastS(getN(ex));if(!l)return null;return(<div style={{margin:"0 14px 6px",padding:"6px 10px",background:"#1A1A1E",borderRadius:8,borderLeft:"3px solid "+wColor}}>
      <div style={{fontSize:9,fontWeight:700,color:wColor,marginBottom:3}}>ULTIMA SESSAO (local)</div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{l.sets?.filter(s=>s.w&&s.r).map((s,i)=><span key={i} style={{fontSize:10,color:"#aaa",background:wColor+"20",padding:"2px 6px",borderRadius:5}}>{s.w}kg x{s.r}</span>)}</div></div>)})()}

    {/* Sets */}
    <div style={{padding:"0 14px",display:"flex",flexDirection:"column",gap:7}}>{sets.map((s,si)=>{const d=gD(exIdx,si),wk2=isWk(getSetType(s)),fk=exIdx+"-"+si,done=!!fired[fk];
      const l=lastS(getN(ex)),ls=l?.sets?.[si];const sheetLast=s.history?.[s.history.length-1];const ref=sheetLast||ls;
      return(<div key={si} style={{background:done?(wk2?wColor+"15":"#1A1A1E"):"#1A1A1E",borderRadius:12,padding:"10px 12px",border:done?"2px solid "+(wk2?wColor+"50":"#10B98150"):"2px solid #2A2A2E"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:5,background:wk2?wColor:"#444",color:"#fff"}}>{getSetType(s)}</span>
            <span style={{fontSize:11,color:"#aaa"}}>{getSetReps(s)}</span>
            {getSetObs(s)&&<span style={{fontSize:9,color:"#888",fontStyle:"italic"}}>{getSetObs(s)}</span>}</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {done&&<button onClick={()=>cancelSet(exIdx,si)} style={{fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:6,background:"#EF444425",color:"#EF4444",border:"1px solid #EF444440"}}>Desfazer</button>}
            {done&&<span style={{fontSize:14,color:"#10B981"}}>{"\u2713"}</span>}
          </div>
        </div>
        {!done&&<div style={{display:"flex",gap:12,justifyContent:"center",alignItems:"flex-end"}}>
          <Stepper label="Peso (kg)" value={d.w} step={inc} color={wColor} onChange={v=>sD(exIdx,si,{w:v})}/>
          <Stepper label="Reps" value={d.r} step={1} color={wColor} onChange={v=>sD(exIdx,si,{r:v})}/>
          {d.w&&d.r&&<button onClick={()=>{setFired(f=>({...f,[fk]:true}));setTimer({seconds:restFor(getSetReps(s),wo?.rest),color:wColor,id:Date.now()})}} style={{padding:"10px 14px",borderRadius:10,background:"#10B981",color:"#fff",fontWeight:800,fontSize:18,whiteSpace:"nowrap",alignSelf:"flex-end",marginBottom:4,lineHeight:1}}>{"\u2713"}</button>}
        </div>}
        {done&&<div style={{display:"flex",justifyContent:"center",gap:16,padding:"6px 0"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>Peso</div><div style={{fontSize:18,fontWeight:900,color:wColor}}>{d.w}kg</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>Reps</div><div style={{fontSize:18,fontWeight:900,color:wColor}}>{d.r}</div></div>
          {wk2&&<div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#888"}}>Vol</div><div style={{fontSize:18,fontWeight:900,color:wColor}}>{d.w*d.r}</div></div>}
        </div>}
        {wk2&&done&&ref?.w&&ref?.r&&<div style={{textAlign:"center",fontSize:10,color:"#888"}}>
          <span style={{color:d.w*d.r>ref.w*ref.r?"#10B981":d.w*d.r<ref.w*ref.r?"#EF4444":"#888"}}>{d.w*d.r>ref.w*ref.r?"\u2191 ":d.w*d.r<ref.w*ref.r?"\u2193 ":"= "}vs anterior</span></div>}
      </div>)})}</div>

    {eV(exIdx)>0&&<div style={{margin:"10px 14px 0",padding:"8px 14px",background:wColor+"15",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,fontWeight:700,color:"#fff"}}>Volume Total</span><span style={{fontSize:18,fontWeight:900,color:wColor}}>{eV(exIdx).toLocaleString()}</span></div>}
    <div style={{display:"flex",gap:8,padding:14,marginTop:6}}>
      {exIdx>0&&<button onClick={()=>setExIdx(exIdx-1)} style={{flex:1,padding:12,borderRadius:10,border:"2px solid #2A2A2E",background:"transparent",color:"#888",fontWeight:700,fontSize:13}}>{"\u2190"} Ant.</button>}
      <button onClick={()=>{if(exIdx<tot-1)setExIdx(exIdx+1);else finish()}} style={{flex:2,padding:12,borderRadius:10,background:wColor,color:"#fff",fontWeight:800,fontSize:14}}>{exIdx<tot-1?"Proximo \u2192":"Finalizar \u2713"}</button></div>
    {timer&&<RestTimer key={timer.id} seconds={timer.seconds} color={timer.color} onDone={()=>setTimer(null)}/>}
  </div>);}

  // SUMMARY
  if(scr==="done")return(<div style={{paddingBottom:20}}>
    <Toast msg={toast}/>
    <div style={{textAlign:"center",padding:"24px 14px 16px",background:"linear-gradient(180deg,"+wColor+"30,transparent)"}}>
      <div style={{fontSize:44,marginBottom:6}}>{"\u{1F389}"}</div><div style={{fontSize:20,fontWeight:900,color:"#fff"}}>Treino Completo!</div><div style={{fontSize:13,color:"#888",marginTop:3}}>Treino {wk} — {getTitle(wo)}</div></div>
    <div style={{padding:"0 14px"}}>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[{l:"Exerc.",v:tot,c:wColor},{l:"Volume",v:exs.reduce((_,__,i)=>_+eV(i),0).toLocaleString(),c:"#10B981"}].map((s,i)=>
          <div key={i} style={{flex:1,background:"#1A1A1E",borderRadius:12,padding:12,textAlign:"center",border:"2px solid "+s.c+"30"}}><div style={{fontSize:22,fontWeight:900,color:s.c}}>{s.v}</div><div style={{fontSize:9,fontWeight:700,color:"#888",textTransform:"uppercase"}}>{s.l}</div></div>)}</div>

      {exs.map((e,ei)=><div key={ei} style={{background:"#1A1A1E",borderRadius:10,padding:"8px 12px",marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"3px solid "+wColor}}>
        <div><div style={{fontSize:12,fontWeight:700,color:"#fff"}}>{getN(e)}</div>
          <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>{getSets(e).map((s,si)=>{const d=gD(ei,si);if(!d.w||!d.r)return null;return <span key={si} style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:isWk(getSetType(s))?wColor+"25":"#2A2A2E",color:isWk(getSetType(s))?wColor:"#888",fontWeight:600}}>{d.w}x{d.r}</span>})}</div></div>
        <div style={{fontSize:13,fontWeight:800,color:wColor}}>{eV(ei).toLocaleString()}</div></div>)}

      {/* Share & Sync */}
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <button onClick={()=>{const t=buildSessionText();navigator.clipboard?.writeText(t);setToast("Copiado!");setTimeout(()=>setToast(""),2500)}}
          style={{flex:1,padding:12,borderRadius:10,background:"#3B82F620",border:"2px solid #3B82F640",color:"#3B82F6",fontWeight:800,fontSize:12}}>{"\u{1F4CB}"} Copiar</button>
        <button onClick={()=>{window.open("https://wa.me/?text="+encodeURIComponent(buildSessionText()),"_blank")}}
          style={{flex:1,padding:12,borderRadius:10,background:"#25D36620",border:"2px solid #25D36640",color:"#25D366",fontWeight:800,fontSize:12}}>{"\u{1F4F2}"} WhatsApp</button>
      </div>

      {syncUrl&&<div style={{background:"#1A1A1E",borderRadius:12,padding:14,marginTop:10,border:"2px solid #333"}}>
        <button onClick={sync} disabled={syncing} style={{width:"100%",padding:12,borderRadius:10,background:syncing?"#333":"#10B981",color:"#fff",fontWeight:800,fontSize:14}}>{syncing?"Enviando...":"Gravar na Planilha \u2197"}</button>
        {syncMsg&&<div style={{fontSize:11,color:syncMsg.includes("Erro")?"#EF4444":"#10B981",marginTop:6,fontWeight:600}}>{syncMsg}</div>}</div>}

      <button onClick={()=>{setScr("home");setWk(null)}} style={{width:"100%",marginTop:14,padding:14,borderRadius:12,background:wColor,color:"#fff",fontWeight:800,fontSize:15}}>Voltar</button>
    </div></div>);
  return null;
}

/* ═══════ ROOT ═══════ */
function App(){
  const[tab,setTab]=useState("gym");const[url,setUrl]=useState(LS.get("url")||"");
  const[data,setData]=useState(LS.get("data")||null);const[syncing,setSyncing]=useState(false);const[syncResult,setSyncResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const history=LS.get("history")||[];
  const hasData=!!data&&!!(data.workouts&&Object.keys(data.workouts).length);
  const needsOnboarding=!hasData&&!url;

  const doSync=async u=>{const t=(u||url||"").trim();if(!t)return;setSyncing(true);setSyncResult(null);setLoading(true);
    try{const j=await fetchSheets(t);if(j.error)throw new Error(j.error);setData(j);LS.set("data",j);LS.set("url",t);setUrl(t);

      const nw=Object.keys(j.workouts||{}).length;
      setSyncResult({ok:true,msg:"Sincronizado! "+nw+" treinos"+(j.diet?" + dieta":"")+" carregados."});
    }catch(e){setSyncResult({ok:false,msg:e.message})}
    setSyncing(false);setLoading(false)};

  // Auto-fetch on first load if URL exists
  useEffect(()=>{

    if(url&&!hasData){setLoading(true);doSync(url)}
  },[]);

  if(loading&&!hasData)return(<div style={cs}><Loader color="#3B82F6" text="Buscando dados da planilha..."/></div>);
  if(needsOnboarding)return(<div style={cs}><SetupTab url={url} setUrl={setUrl} onSync={doSync} syncing={syncing} syncResult={syncResult} connected={false} history={[]} isOnboarding={true}/></div>);

  const tabs=[{id:"gym",icon:"\u{1F3CB}\uFE0F",label:"Treino",color:"#3B82F6"},{id:"diet",icon:"\u{1F37D}\uFE0F",label:"Dieta",color:"#10B981"},{id:"setup",icon:"\u2699\uFE0F",label:"Setup",color:"#F97316"}];
  return(<div style={{...cs,paddingBottom:68}}>
    <div style={{minHeight:"calc(100vh - 68px)"}}>
      {tab==="gym"&&<GymTab workouts={data?.workouts} syncUrl={url}/>}
      {tab==="diet"&&<DietTab diet={data?.diet}/>}
      {tab==="setup"&&<SetupTab url={url} setUrl={setUrl} onSync={doSync} syncing={syncing} syncResult={syncResult} connected={hasData} history={history} isOnboarding={false}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:90,background:"#1A1A1E",borderTop:"1px solid #2A2A2E",display:"flex",justifyContent:"center",paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
      <div style={{display:"flex",maxWidth:480,width:"100%"}}>{tabs.map(t=>{const a=tab===t.id;return(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0 8px",background:"transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{fontSize:20,filter:a?"none":"grayscale(1) opacity(0.5)"}}>{t.icon}</div>
          <div style={{fontSize:10,fontWeight:a?800:600,color:a?t.color:"#666"}}>{t.label}</div>
          {a&&<div style={{width:20,height:3,borderRadius:2,background:t.color,marginTop:1}}/>}</button>)})}</div></div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
